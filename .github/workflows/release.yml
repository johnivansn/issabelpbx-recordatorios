name: Release Issabel Module

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: none
          coverage: none

      - name: Read module metadata
        id: meta
        run: |
          set -euo pipefail
          RAWNAME="$(php -r '$xml = simplexml_load_file("recordatorios/module.xml"); echo (string) $xml->rawname;')"
          VERSION="$(php -r '$xml = simplexml_load_file("recordatorios/module.xml"); echo (string) $xml->version;')"
          echo "rawname=$RAWNAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate git tag matches module version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.meta.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Git tag ($GITHUB_REF_NAME) does not match module.xml version ($VERSION)" >&2
            exit 1
          fi

      - name: Run PHP lint
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            php -l "$file"
          done < <(find recordatorios -type f -name '*.php' | sort)

      - name: Build package tree
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p build
          cp -R recordatorios "build/${{ steps.meta.outputs.rawname }}"

      - name: Create tgz
        run: |
          set -euo pipefail
          PACKAGE="${{ steps.meta.outputs.rawname }}-${{ steps.meta.outputs.version }}.tgz"
          tar -czf "$PACKAGE" -C build "${{ steps.meta.outputs.rawname }}"

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.rawname }}-${{ steps.meta.outputs.version }}.tgz
          generate_release_notes: true
