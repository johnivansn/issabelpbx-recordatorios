name: Build Issabel Module

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: none
          coverage: none

      - name: Validate PHP syntax
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            php -l "$file"
          done < <(find recordatorios -type f -name '*.php' | sort)

      - name: Validate module descriptor
        run: |
          php -r '
          $xml = simplexml_load_file("recordatorios/module.xml");
          if (!$xml) {
              fwrite(STDERR, "Unable to parse module.xml\n");
              exit(1);
          }
          if ((string) $xml->rawname !== "recordatorios") {
              fwrite(STDERR, "Invalid rawname in module.xml\n");
              exit(1);
          }
          '
