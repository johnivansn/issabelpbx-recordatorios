name: Build Issabel Module

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: none
          coverage: none

      - name: Validate PHP syntax
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            php -l "$file"
          done < <(find recordatorios -type f -name '*.php' | sort)

      - name: Validate module descriptor
        run: |
          php -r '
          $xml = simplexml_load_file("recordatorios/module.xml");
          if (!$xml) {
              fwrite(STDERR, "Unable to parse module.xml\n");
              exit(1);
          }
          if ((string) $xml->rawname !== "recordatorios") {
              fwrite(STDERR, "Invalid rawname in module.xml\n");
              exit(1);
          }
          '

  package:
    name: Package tgz
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read module metadata
        id: meta
        run: |
          set -euo pipefail
          RAWNAME="$(php -r '$xml = simplexml_load_file("recordatorios/module.xml"); echo (string) $xml->rawname;')"
          VERSION="$(php -r '$xml = simplexml_load_file("recordatorios/module.xml"); echo (string) $xml->version;')"
          echo "rawname=$RAWNAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build package tree
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p build
          cp -R recordatorios "build/${{ steps.meta.outputs.rawname }}"

      - name: Create tgz
        run: |
          set -euo pipefail
          tar -czf "${{ steps.meta.outputs.rawname }}-${{ steps.meta.outputs.version }}.tgz" -C build "${{ steps.meta.outputs.rawname }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.rawname }}-${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.rawname }}-${{ steps.meta.outputs.version }}.tgz
          if-no-files-found: error
